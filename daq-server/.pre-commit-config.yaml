# Pre-commit hooks configuration for Diablo FSW
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.(md|txt)$'
      - id: end-of-file-fixer
        exclude: '^config/config\.toml\.auto$'
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'develop']

  # C++ formatting with clang-format
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
        args: ['-i']
        files: \.(cpp|hpp|c|h)$
        exclude: '^external/'

  # C++ linting (skip if no compilation database)
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-tidy
        args: ['-quiet']
        files: \.(cpp|hpp)$
        exclude: '^external/|^build/'
        additional_dependencies: ['clang-tidy']
        pass_filenames: true
        always_run: false
        stages: [manual]

  # Python formatting
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3
        files: \.py$
        exclude: '^external/|^venv/|^env/'

  # Python linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=120', '--extend-ignore=E203,W503']
        files: \.py$
        exclude: '^external/|^venv/|^env/'

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        args: ['-e', 'SC1091', '-e', 'SC2086']
        files: \.sh$

  # Custom hooks
  - repo: local
    hooks:
      - id: check-formatting
        name: Check code formatting
        entry: bash -c './format.sh --check || exit 1'
        language: system
        files: \.(cpp|hpp|c|h)$
        pass_filenames: false
        always_run: false
        stages: [manual]

      - id: check-todos
        name: Check for TODO/FIXME in committed files
        entry: >
          bash -c 'git diff --cached --name-only | xargs grep -l "TODO\|FIXME\|HACK" && echo "Warning: TODO/FIXME found in committed files" || true'
        language: system
        pass_filenames: false
        always_run: false

      - id: check-build
        name: Verify build still works
        entry: >
          bash -c 'mkdir -p build && cd build && cmake .. && make -j$(nproc) || exit 1'
        language: system
        pass_filenames: false
        always_run: false
        stages: [pre-push]
        verbose: true
