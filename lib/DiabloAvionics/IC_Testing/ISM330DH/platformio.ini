; ISM330DHCX (STAR_ISM330DH) — stream IMU + INT1 wake-up (high accel)
; ESP32-C6 DevKitC-1 — same toolchain as IC_Testing/MCP3201T

[env:esp32-c6-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
lib_extra_dirs =
	../../libraries
build_flags =
	-I../../common
	-std=gnu++17
	-DBOARD_HAS_PSRAM=0
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
build_unflags =
	-std=gnu++11
monitor_speed = 115200
