# =============================================================================
# Sensor System Configuration
# Modular config for boards, sensors, actuators, calibration, and routing
# =============================================================================

# =============================================================================
# System
# =============================================================================
[system]
mode = "GROUND"          # "FLIGHT" or "GROUND"
state = "GSE"            # Initial state: GSE, HOTFIRE, etc.

# =============================================================================
# Network - DAQ Bridge Listener
# =============================================================================
[network]
bind_ip = "0.0.0.0"
sensor_port = 5006       # Port for all sensor data (PT, LC, TC, RTD boards send here)
actuator_cmd_port = 5005 # Port actuator boards listen on for commands
buffer_size = 1024

# =============================================================================
# Server Heartbeat - UDP broadcast config
# =============================================================================
[server_heartbeat]
interval_ms = 1000                 # Broadcast SERVER_HEARTBEAT every 1 second
broadcast_port = 5005              # Default: actuator command port
broadcast_ip = "255.255.255.255"   # Full-subnet broadcast

# =============================================================================
# Network - Elodin Database
# =============================================================================
[database]
host = "127.0.0.1"
port = 2240
auto_flush_interval_ms = 100
max_buffer_size = 4096
connection_retry_attempts = 3
connection_retry_delay_ms = 1000

# =============================================================================
# Board Discovery
# =============================================================================
[discovery]
enabled = true
network_interface = "auto"  # "auto" = detect interface with 192.168.2.x IP
mode = "hybrid"             # "passive", "active", "hybrid"
subnet = "192.168.2.0/24"
ip_range_start = 100
ip_range_end = 150
discovery_timeout_seconds = 30

# =============================================================================
# Boards - Each board has a type, IP, and sends/receives on specific ports
#
# Board types: PT (Pressure Transducer), LC (Load Cell), TC (Thermocouple),
#              RTD (Resistance Temperature Detector), ACTUATOR
# =============================================================================

[boards.pt_board]
type = "PT"
ip = "192.168.2.21"
send_port = 5005           # Board sends SENSOR_DATA to this port on our PC
num_sensors = 10            # 10 connectors on this board
board_id = 21               # PT Board #1 (label on board)
enabled = true
enable_serial_printing = true
# voltage_reference: 0 = Internal 2.5V, 1 = VDD (ratiometric), 2 = 5V absolute
voltage_reference = 1
necessary_for_abort = true   # This sense board participates in abort logic
# Exactly one actuator board should be marked as designated_survivor
# (PT boards are never designated survivors)
designated_survivor = false
# Active connectors: list of connector IDs (1-10) that have sensors plugged in
# Leave empty [] to use all connectors, or specify only active ones
active_connectors = [1, 2, 3, 4, 5, 6, 7]  # Example: only connectors 1-7 are used

[boards.pt_board_2]
type = "PT"
ip = "192.168.2.22"
send_port = 5005           # Board sends SENSOR_DATA to this port on our PC
num_sensors = 10            # 10 connectors on this board
board_id = 22               # PT Board #2 (label on board)
enabled = true
enable_serial_printing = true
# voltage_reference: 0 = Internal 2.5V, 1 = VDD (ratiometric), 2 = 5V absolute
voltage_reference = 0
adc_ref_voltage = 2.5      # Fixed ADC reference voltage for this board (V)
# Connector 2 is hardware-wired to measure excitation voltage on this PCB.
# hp_pt_connectors lists whichever connectors have HP PT sensors plugged in
# (any subset of active_connectors except excitation_connector_id).
active_connectors = [1, 2, 3, 4]
hp_pt_connectors = [1, 3, 4]   # Connectors with 4-20 mA HP PT sensors (connector 2 is excitation, not a sensor)
excitation_connector_id = 2    # Connector that measures excitation voltage (not plotted)
hp_pt_full_scale_psi = 5000.0   # Full-scale pressure at 20 mA (PSI)
hp_pt_sense_resistor_ohms = 120 # Sense resistor for 4-20 mA → voltage (Ω)
# Excitation voltage divider: ADC sees this fraction of V_exc; V_exc = V_adc / this value
excitation_divider_attenuation = 0.0762

[boards.actuator_board]
type = "ACTUATOR"
ip = "192.168.2.11"
send_port = 5005           # Actuator board also sends current sense data here
listen_port = 5005         # Actuator board listens for ACTUATOR_COMMAND on this port
num_actuators = 10
num_sensors = 10            # 10 current sense ADC channels
board_id = 11              # Actuator Board #1 (label on board)
enabled = false
enable_serial_printing = true
necessary_for_abort = false
# voltage_reference: 0 = Internal 2.5V, 1 = VDD (ratiometric), 2 = 5V absolute
voltage_reference = 0

[boards.actuator_board_2]
type = "ACTUATOR"
ip = "192.168.2.12"
send_port = 5005           # Actuator board also sends current sense data here
listen_port = 5005         # Actuator board listens for ACTUATOR_COMMAND on this port
num_actuators = 10
num_sensors = 10            # 10 current sense ADC channels
board_id = 12              # Actuator Board #2 (label on board)
enabled = true
enable_serial_printing = true
designated_survivor = true
necessary_for_abort = false
# voltage_reference: 0 = Internal 2.5V, 1 = VDD (ratiometric), 2 = 5V absolute
voltage_reference = 0

[boards.actuator_board_3]
type = "ACTUATOR"
ip = "192.168.2.13"
send_port = 5005
listen_port = 5005
num_actuators = 10
num_sensors = 10
board_id = 13              # Actuator Board #3 (label on board)
enabled = false
enable_serial_printing = true
necessary_for_abort = false
voltage_reference = 0

[boards.actuator_board_4]
type = "ACTUATOR"
ip = "192.168.2.14"
send_port = 5005
listen_port = 5005
num_actuators = 10
num_sensors = 10
board_id = 14              # Actuator Board #4 (label on board)
enabled = true
enable_serial_printing = true
necessary_for_abort = false
voltage_reference = 0

[boards.lc_board]
type = "LC"
ip = "192.168.2.41"
send_port = 5005
num_sensors = 4
board_id = 41              # LC Board #1 (label on board)
enabled = true              # flip to true when board is connected
enable_serial_printing = true
necessary_for_abort = false
designated_survivor = false
# voltage_reference: 0 = Internal 2.5V, 1 = VDD (ratiometric), 2 = 5V absolute
voltage_reference = 1
# Active connectors: list of connector IDs (1-4) that have sensors plugged in
# Leave empty [] to use all connectors, or specify only active ones
active_connectors = [1, 2, 3]  # 3 load cell sensors (IDs 1, 2, 3)

[boards.lc_board_2]
type = "LC"
ip = "192.168.2.42"
send_port = 5005
num_sensors = 4
board_id = 42              # LC Board #2 (label on board)
enabled = false
enable_serial_printing = true
necessary_for_abort = false
designated_survivor = false
voltage_reference = 0
active_connectors = []

[boards.tc_board]
type = "TC"
ip = "192.168.2.51"
send_port = 5005
num_sensors = 10
board_id = 51              # TC Board #1 (label on board)
enabled = true
enable_serial_printing = true
necessary_for_abort = false
designated_survivor = false
# voltage_reference: 0 = Internal 2.5V, 1 = VDD (ratiometric), 2 = 5V absolute
