# =============================================================================
# Multiple Boards Example (commented out - uncomment to use)
# =============================================================================
# You can define multiple boards of the same type by using different section names:
#
# [boards.pt_board_1]
# type = "PT"
# ip = "192.168.2.101"
# send_port = 5005
# num_sensors = 10
# board_id = 1
# enabled = true
# active_connectors = [1, 2, 3, 4, 5]
#
# [boards.pt_board_2]
# type = "PT"
# ip = "192.168.2.111"
# send_port = 5005
# num_sensors = 10
# board_id = 11
# enabled = true
# active_connectors = [1, 2, 3]
#
# The config parser will find all boards with type="PT" and process them separately.
# Each board can have different IPs and different active_connectors.



# =============================================================================
# Sensor Roles - PT Board #1 (board_id = 21)
# Board-specific mapping to prevent cross-contamination between boards.
# pt_board in [boards] has board_id = 21.
# Chamber PTs: connector 4 = Mid 1, 8 = Mid 2, 9 = Throat 1, 10 = Throat 2.
# =============================================================================
[sensor_roles_pt_board]
"Fuel Upstream"      = 1
"GSE Low"            = 2
"Fuel Downstream"    = 3
"Chamber Mid PT 1"   = 4
"Ox Upstream"        = 5
"GN2 Regulated"      = 6
"Ox Downstream"      = 7
"Chamber Mid PT 2"   = 8
"Chamber Throat PT 1" = 9
"Chamber Throat PT 2" = 10

# =============================================================================
# Abort PTs - PTs required for abort logic (sensor role name → pressure threshold PSI)
# Threshold is converted to ADC code per PT calibration when building ACTUATOR_CONFIG.
# =============================================================================
[abort_pts]
"Fuel Upstream"   = 400
"Ox Upstream"     = 400

# =============================================================================
# Sensor Roles - RTD Board #1 (board_id = 31)
# Channel 1 = COPV temp (COPV pane); channels 2–4 = LOX tank (LOX pane)
# =============================================================================
[sensor_roles_rtd_board]
"COPV RTD"  = 1
"LOX Upper" = 2
"LOX Mid"   = 3
"LOX Lower" = 4

# =============================================================================
# Sensor Roles - TC Board #1 (board_id = 51)
# Chamber TCs: 2 on chamber mid, 2 on chamber throat
# =============================================================================
[sensor_roles_tc_board]
"Chamber Mid TC 1"    = 2
"Chamber Mid TC 2"    = 3
"Chamber Throat TC 1" = 4
"Chamber Throat TC 2" = 5

# =============================================================================
# Sensor Roles - PT Board #2 (board_id = 22, High-Pressure 4-20 mA sensors)
# Maps connector_id (1-indexed) to human-readable names for hp_pt_connectors.
# pt_board_2 in [boards] has board_id = 22.
# If excitation_connector_id is -1, no dedicated excitation channel is required.
# =============================================================================
[sensor_roles_pt2]
"GSE High"  = 1    # Connector 1 = GSE High (HP PT)
"GSE Mid"   = 3    # Connector 3 = GSE Mid (HP PT)
"GN2 High" = 4    # Connector 4 is GN2 High (HP PT sensor)
# Connector 2 currently unused

# =============================================================================
# Sensor Roles - Encoder Board (board_id = 61)
# AS5600 magnetic encoders — 12-bit angle (0-4095)
# =============================================================================
[sensor_roles_encoder_board]
"Encoder 1" = 1
"Encoder 2" = 2

# =============================================================================
# Actuator Roles - Maps role names to [type, actuator_id, board_id]
# type: "NC" (Normally Closed) or "NO" (Normally Open)
# actuator_id: 1-indexed connector number on the actuator board
# board_id: numeric board ID from [boards] (e.g. 14 = Actuator Board #1, 12 = Actuator Board #2).
#           IP is resolved from config.boards by board_id.
# =============================================================================
[actuator_roles]
# Actuator Board #1 → board_id 12 (names match state_machine_actuators.csv)
"LOX Main"               = ["NC", 1, 12]
"Fuel Vent"             = ["NC", 2, 12]
"Fuel Press"            = ["NC", 3, 12]
"Fuel Main"             = ["NO", 7, 12]
"LOX Vent"              = ["NC", 6, 12]
"LOX Press"             = ["NO", 8, 12]
"GSE Low Press Vent"    = ["NC", 5, 12]
"Fuel Fill Press"       = ["NC", 10, 12]
# Actuator Board #2 → board_id 14
"Fuel Fill Vent"        = ["NC", 1, 14]
"GSE LOX Fill Vent"     = ["NC", 2, 14]
"GSE High Press Control" = ["NC", 3, 14]
"GSE Med Press Control" = ["NC", 4, 14]
"GSE High Press Vent"   = ["NC", 5, 14]
"GN2 Vent"              = ["NC", 6, 14]
"LOX Fill"              = ["NC", 7, 14]
"LOX Dump"              = ["NC", 8, 14]

# Abbreviation mapping for state machine CSV
[actuator_abbrev]
FV = "Fuel Vent"
OV = "LOX Vent"
FP = "Fuel Press"
OP = "LOX Press"
FM = "Fuel Main"
OM = "LOX Main"
FF = "Fuel Fill"

# Actuator service (C++) — when port is set, backend forwards state transitions here;
# actuator commands are sent by C++ instead of Node.
# Env ACTUATOR_SERVICE_PORT overrides this; startup script sets it automatically.
# bind_address: bind outbound UDP to this IP so packets use the right interface.
# On multi-homed hosts (e.g. WiFi + DAQ Ethernet), set to your 192.168.2.x IP.
[actuator_service]
port = 9998
bind_address = "0.0.0.0"

# Controller service (C++) — TCP port for FIRE_START / FIRE_STOP commands.
# Backend sends FIRE_START when entering FIRE state, FIRE_STOP on exit.
# PWM is only sent to actuator boards while fire_active is set.
[controller_service]
port = 9999
# Hotfire duration (ms). FIRE state auto-ends after this unless extended.
fire_duration_ms = 6000
# Extended fire duration (ms) when user taps "Extend Fire".
fire_extended_ms = 10000

# =============================================================================
# Elodin Table Routing - Maps sensor types to Elodin table IDs (config-driven, no fixed hexes in code)
# packet_id = [high_byte, low_byte]; channels = 1-based channel count (low byte 0x01..0x0N).
# Backend (server.ts) and daq_bridge both read this; add/remove routing types here for modularity.
# =============================================================================
[routing.pt_raw]
packet_id = [0x20, 0x00]
channels = 14
description = "Raw PT ADC counts — 0x01..0x0E (board1: 1-7, board2+offset10: 11-14)"

[routing.pt_calibrated]
packet_id = [0x20, 0x10]
channels = 30
description = "Calibrated PT pressure (PSI) — 0x11..0x1E (board1: 0x11-0x17, board2: 0x1B-0x1E)"

[routing.tc_raw]
packet_id = [0x21, 0x00]
channels = 20
description = "Raw TC ADC counts"

[routing.rtd_raw]
packet_id = [0x22, 0x00]
channels = 20
description = "Raw RTD resistance counts"

[routing.lc_raw]
packet_id = [0x23, 0x00]
channels = 20
description = "Raw LC ADC counts"

[routing.lc_calibrated]
packet_id = [0x23, 0x10]
channels = 20
description = "Calibrated LC force"

[routing.actuator_status]
packet_id = [0x30, 0x00]
channels = 20
description = "Actuator current sense readings"

[routing.actuator_cal]
packet_id = [0x31, 0x00]
channels = 20
description = "Calibrated actuator current (amps) from calibration_service"

[routing.encoder_raw]
packet_id = [0x24, 0x00]
channels = 2
description = "Raw encoder angle (0-4095) — AS5600 12-bit"

# Which routing types daq_bridge publishes to Elodin.
# PT_Cal/TC_Cal/LC_Cal/RTD_Cal are written by calibration_server (subscribes to relay, applies calibration, writes to Elodin).
[daq_bridge]
publish = ["pt_raw", "tc_raw", "rtd_raw", "lc_raw", "actuator_status", "actuator_cal", "encoder_raw"]

# =============================================================================
# Calibration
# =============================================================================
[calibration]
enabled = true
# use_robust_stack: when true (default), Python calibration_server is sole writer; C++ polynomial disabled
use_robust_stack = true
# exclude_hp_pt: when true (default), robust stack skips high-pressure 4-20 mA PTs (boards with hp_pt_connectors)
exclude_hp_pt = true
# prior_from_polynomial: when true, load polynomial calibration (calibration/*.json) as initial priors
# so ZERO ALL + CAPTURE match polynomial accuracy (fixes 150 PSI reading as 56.8)
prior_from_polynomial = true

# Orchestrator settings (Phase 1 + Phase 2 lifecycle)
[calibration.orchestrator]
# consensus_enabled: true = test/calibration (PTs on common manifold); false = flight (independent measurements)
consensus_enabled = true
self_cal_alpha_threshold = 0.6   # α≥ this for self-calibration
agreement_threshold = 0.6        # agreement≥ this for consensus-based self-cal
min_points = 5               # Minimum points to attempt a fit
target_points = 15           # Target for HIGH confidence
max_points = 30              # Keep at most this many per channel
min_r_squared = 0.95         # Minimum R² for acceptable calibration
target_r_squared = 0.99      # R² for MAXIMUM confidence
rls_forgetting_factor = 0.995  # Phase 2 RLS forgetting factor (0.99–1.0)
drift_glr_threshold = 3.0   # GLR statistic threshold for drift alarm
auto_save_interval_sec = 300 # Phase 2 auto-save interval
status_interval_sec = 30     # Phase 2 status print interval

# PT calibration sources (tried in order: JSON first, then CSV)
# Same path as femboy/combined_fsw_gui and daq_bridge: scripts/calibration/calibrations
# If json_path is set, that file is used; otherwise latest in json_dir is used.
[calibration.pt]
# json_path = "scripts/calibration/calibrations/calibration_YYYY-MM-DD....json"  # optional override
json_dir = "scripts/calibration/calibrations"
csv_paths = [
    "external/DiabloAvionics/PT_Board/Calibration/PT Calibration Attempt 2026-02-04_test2.csv"
]
# Polynomial: psi = A*(adc^3) + B*(adc^2) + C*adc + D

[calibration.tc]
json_dir = "scripts/calibration/calibrations/tc"
csv_paths = []
# Raw K-type fallback: ADC ref voltage (V)
adc_ref_voltage = 2.5

[calibration.rtd]
json_dir = "scripts/calibration/calibrations/rtd"
csv_paths = []
# Raw ADC→temp fallback (when no calibration points): Pt1000 r0=1000
r0_ohm = 1000
adc_ref_voltage = 2.5   # ADC reference (V)
excitation_ua = 1000    # IDAC excitation (µA)

[calibration.lc]
json_dir = "scripts/calibration/calibrations/lc"
csv_paths = []
# Raw LC fallback: sensitivity (mV/V), pga_gain, full_scale_value (kg)
sensitivity_mv_per_v = 2.0
pga_gain = 32.0
full_scale_value = 300.0

