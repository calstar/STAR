# Active connectors: list of connector IDs (1-10) that have sensors plugged in
# Leave empty [] to use all connectors, or specify only active ones
active_connectors = [2,3,4,5]  # Example: [1, 2, 3, 4, 5] if only connectors 1-5 are used

[boards.tc_board_2]
type = "TC"
ip = "192.168.2.52"
send_port = 5005
num_sensors = 10
board_id = 52              # TC Board #2 (label on board)
enabled = false
enable_serial_printing = true
necessary_for_abort = false
designated_survivor = false
voltage_reference = 0
active_connectors = []

[boards.rtd_board]
type = "RTD"
ip = "192.168.2.31"
send_port = 5005
num_sensors = 4
board_id = 31              # RTD Board #1 (label on board)
enabled = true
enable_serial_printing = true
necessary_for_abort = false
designated_survivor = false
# voltage_reference: 0 = Internal 2.5V, 1 = VDD (ratiometric), 2 = 5V absolute
voltage_reference = 0
# Active connectors: list of connector IDs (1-4) that have sensors plugged in
# Leave empty [] to use all connectors, or specify only active ones
active_connectors = []  # Example: [1, 2] if only connectors 1-2 are used

[boards.rtd_board_2]
type = "RTD"
ip = "192.168.2.32"
send_port = 5005
num_sensors = 4
board_id = 32              # RTD Board #2 (label on board)
enabled = false
enable_serial_printing = true
necessary_for_abort = false
designated_survivor = false
voltage_reference = 0
active_connectors = []

# =============================================================================
# Multiple Boards Example (commented out - uncomment to use)
# =============================================================================
# You can define multiple boards of the same type by using different section names:
#
# [boards.pt_board_1]
# type = "PT"
# ip = "192.168.2.101"
# send_port = 5005
# num_sensors = 10
# board_id = 1
# enabled = true
# active_connectors = [1, 2, 3, 4, 5]
#
# [boards.pt_board_2]
# type = "PT"
# ip = "192.168.2.111"
# send_port = 5005
# num_sensors = 10
# board_id = 11
# enabled = true
# active_connectors = [1, 2, 3]
#
# The config parser will find all boards with type="PT" and process them separately.
# Each board can have different IPs and different active_connectors.



# =============================================================================
# Sensor Roles - PT Board #1 (board_id = 21)
# Board-specific mapping to prevent cross-contamination between boards.
# pt_board in [boards] has board_id = 21.
# =============================================================================
[sensor_roles_pt_board]
"Fuel Upstream"   = 1
"GSE Low"         = 2
"Fuel Fill Tank"  = 4
"Fuel Downstream" = 3
"Ox Upstream"     = 5
"GN2 Regulated"   = 6
"Ox Downstream"   = 7

# =============================================================================
# Abort PTs - PTs required for abort logic (sensor role name → pressure threshold PSI)
# Threshold is converted to ADC code per PT calibration when building ACTUATOR_CONFIG.
# =============================================================================
[abort_pts]
# "Fuel Upstream"   = 400
# "Ox Upstream"     = 400

# =============================================================================
# Sensor Roles - PT Board #2 (board_id = 22, High-Pressure 4-20 mA sensors)
# Maps connector_id (1-indexed) to human-readable names for hp_pt_connectors.
# pt_board_2 in [boards] has board_id = 22.
# The excitation_connector_id must NOT appear here — it is cached internally
# and never emitted as a sensor update.
# =============================================================================
[sensor_roles_pt2]
"GSE Mid"  = 1    # Connector 1 is GSE Mid (HP PT sensor)
"GSE High" = 3    # Connector 3 is GSE High (HP PT sensor)
"GN2 High" = 4    # Connector 4 is GN2 High (HP PT sensor)
# Connector 2 is excitation voltage, not a sensor

# =============================================================================
# Actuator Roles - Maps role names to [type, actuator_id, board_id]
# type: "NC" (Normally Closed) or "NO" (Normally Open)
# actuator_id: 1-indexed connector number on the actuator board
# board_id: numeric board ID from [boards] (e.g. 14 = Actuator Board #1, 12 = Actuator Board #2).
#           IP is resolved from config.boards by board_id.
# =============================================================================
[actuator_roles]
# Actuator Board #1 → board_id 14 (names match state_machine_actuators.csv)
"LOX Main"               = ["NO", 1, 14]
"Fuel Vent"             = ["NC", 2, 14]
"Fuel Press"            = ["NC", 3, 14]
"Fuel Main"             = ["NC", 7, 14]
"LOX Vent"              = ["NC", 6, 14]
"LOX Press"             = ["NO", 8, 14]
"GSE Low Press Vent"    = ["NC", 5, 14]
"Fuel Fill Press"       = ["NC", 10, 14]
# Actuator Board #2 → board_id 12
"Fuel Fill Vent"        = ["NC", 1, 12]
"GSE LOX Fill Vent"     = ["NC", 2, 12]
"GSE High Press Control" = ["NC", 3, 12]
"GSE Med Press Control" = ["NC", 4, 12]
"GSE High Press Vent"   = ["NC", 5, 12]
"GN2 Vent"              = ["NC", 6, 12]
"LOX Fill"              = ["NC", 7, 12]
"LOX Dump"              = ["NC", 8, 12]

# Abbreviation mapping for state machine CSV
[actuator_abbrev]
FV = "Fuel Vent"
OV = "LOX Vent"
FP = "Fuel Press"
OP = "LOX Press"
FM = "Fuel Main"
OM = "LOX Main"
FF = "Fuel Fill"

# =============================================================================
# Elodin Table Routing - Maps sensor types to Elodin table IDs
# packet_id is [high_byte, low_byte] for the Elodin table
# =============================================================================
[routing.pt_raw]
packet_id = [0x20, 0x00]
description = "Raw PT ADC counts"

[routing.pt_calibrated]
packet_id = [0x20, 0x10]
description = "Calibrated PT pressure (PSI)"

[routing.tc_raw]
packet_id = [0x21, 0x00]
description = "Raw TC ADC counts"

[routing.rtd_raw]
packet_id = [0x22, 0x00]
description = "Raw RTD resistance counts"

[routing.lc_raw]
packet_id = [0x23, 0x00]
description = "Raw LC ADC counts"

[routing.lc_calibrated]
packet_id = [0x23, 0x10]
description = "Calibrated LC force"

[routing.actuator_status]
packet_id = [0x30, 0x00]
description = "Actuator current sense readings"

# =============================================================================
# Calibration
# =============================================================================
[calibration]
enabled = true

# Orchestrator settings (Phase 1 + Phase 2 lifecycle)
[calibration.orchestrator]
min_points = 5               # Minimum points to attempt a fit
target_points = 15           # Target for HIGH confidence
max_points = 30              # Keep at most this many per channel
min_r_squared = 0.95         # Minimum R² for acceptable calibration
target_r_squared = 0.99      # R² for MAXIMUM confidence
rls_forgetting_factor = 0.995  # Phase 2 RLS forgetting factor (0.99–1.0)
drift_glr_threshold = 3.0   # GLR statistic threshold for drift alarm
auto_save_interval_sec = 300 # Phase 2 auto-save interval
status_interval_sec = 30     # Phase 2 status print interval

# PT calibration sources (tried in order: JSON first, then CSV)
# If json_path is set, that file is used for PT data; otherwise latest in json_dir is used.
[calibration.pt]
json_path = "scripts/calibration/calibrations/calibration_2026-02-24T02-32-07.json"
json_dir = "scripts/calibration/calibrations"
csv_paths = [
    "external/DiabloAvionics/PT_Board/Calibration/PT Calibration Attempt 2026-02-04_test2.csv"
]
# Polynomial: psi = A*(adc^3) + B*(adc^2) + C*adc + D

[calibration.tc]
json_dir = "scripts/calibration/calibrations/tc"
csv_paths = []

[calibration.rtd]
json_dir = "scripts/calibration/calibrations/rtd"
csv_paths = []

[calibration.lc]
json_dir = "scripts/calibration/calibrations/lc"
csv_paths = []

# =============================================================================
# Pressure Limits (for GUI gauges and alarms)
# =============================================================================
[pressure_limits.GN2]
THRESH = 550
NOP = 900
MEOP = 950
POP = 1000

[pressure_limits.ETH]
THRESH = 550
NOP = 600
MEOP = 650
POP = 750

[pressure_limits.LOX]
THRESH = 550
NOP = 600
MEOP = 650
POP = 750

# Pressure sensor → fluid system mapping (sensor_id → system)
[pressure_mappings]
GN2 = 6
ETH = 1
LOX = 5

# =============================================================================
# Display Settings
# =============================================================================
[display]
adc_bits = 32
window_seconds = 26.0
y_axis_min = 0.0
y_axis_max = 700.0
y_axis_autoscale = true
only_show_actuators_with_roles = true
only_show_pt_with_roles = true
graph_ma_samples = 1
display_ma_samples = 1

# =============================================================================
# State Machine
# =============================================================================
[state_machine]
actuator_csv = "external/DiabloAvionics/test_guis/state_machine_actuators.csv"
transitions_csv = "external/DiabloAvionics/test_guis/state_transitions.csv"

# =============================================================================
# Controller Settings (PWM Control)
# =============================================================================
[controller]
# PWM frequency for actuator control (Hz)
pwm_frequency_hz = 10.0
# PWM command duration (ms) - how long each command stays active
pwm_duration_ms = 1000
# Fallback duty cycles when controller service is unavailable (0.0-1.0)
fallback_fuel_duty_cycle = 0.5
fallback_ox_duty_cycle = 0.2
# Controller loop update rate (Hz)
controller_loop_hz = 10.0
# Controller service URL
controller_service_url = "http://localhost:8000"
# Controller config path (YAML file relative to engine_sim/configs/). If empty, uses default.
# Example: "controller_default.yaml" or "hotfire_conservative.yaml"
controller_config_path = ""

# Controller Targets (used when state machine enters FIRE state)
# command_type can be: "THRUST_DESIRED", "ALTITUDE_GOAL", or "PRESSURE_TARGET"
command_type = "THRUST_DESIRED"
thrust_desired = 1000.0        # Target thrust in Newtons
altitude_goal = 0.0            # Target altitude (if using ALTITUDE_GOAL)
pressure_fuel_target = 0.0     # Target fuel pressure (if using PRESSURE_TARGET)
pressure_ox_target = 0.0       # Target ox pressure (if using PRESSURE_TARGET)
# Duty sweep: open-loop multi-step test (no controller service needed).
duty_sweep_enabled = false
duty_sweep_step_duration_sec = 2.0
# Steps as [fuel_duty, ox_duty] in 0.0-1.0; 5 steps x 2s = 10s
duty_sweep_steps = [[0.1, 0.1], [0.3, 0.2], [0.5, 0.4], [0.3, 0.3], [0.1, 0.1]]

# Use C++ RobustDDPController service for PWM instead of Python FastAPI.
# When true, the web backend will not start its own controller loop or send PWM.
use_cpp_controller = false

# =============================================================================
# Phase 2 Calibration Settings
# =============================================================================
[phase2]
# Enable Phase 2 autonomous calibration
enabled = false
# Drift detection threshold (GLR statistic)
drift_threshold = 2.0
# Process noise for covariance growth (models drift rate)
process_noise = 1e-6
# EMA smoothing factor for prediction baseline (0.01-0.1)
ema_smoothing_alpha = 0.02
# RLS forgetting factor (0.99-0.999)
forgetting_factor = 0.995
# Auto-save interval (seconds)
save_interval_seconds = 300
# Minimum residuals required for drift detection
min_residuals_for_drift_check = 10
# Absolute drift threshold (PSI) - also triggers on mean residual > this value
absolute_drift_threshold_psi = 2.0
# Cross-sensor consensus threshold (PSI) - sensors in same group should agree within this
consensus_threshold_psi = 1.0
# Consensus update rate (0.0-1.0) - how aggressively to update based on sensor agreement
consensus_update_rate = 0.1

# =============================================================================
# Robust Calibration Integration (Python Sidecar)
# =============================================================================
[calibration.sidecar]
enabled = true
host = "127.0.0.1"
port = 8100
reconnect_interval_ms = 5000
adc_forward_interval_ms = 200

[calibration.environmental]
temperature = 25.0
humidity = 50.0
vibration = 0.0
aging_factor = 1.0
mounting_torque = 1.0
# Minimum sensors needed for consensus-based updates
min_consensus_sensors = 2
