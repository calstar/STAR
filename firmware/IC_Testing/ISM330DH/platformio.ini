; ISM330DHCX (STAR_ISM330DH) - stream IMU + INT1 wake-up (high accel).
; ESP32-C6 DevKitC-1 with Serial over native USB-CDC/JTAG.

[platformio]
extra_configs = ../../platformio-common.ini

[env:esp32-c6-devkitc-1]
extends = esp32c6_usb_base
lib_extra_dirs =
    ../../libraries
build_flags =
    ${esp32c6_usb_base.build_flags}
    -I../../common
