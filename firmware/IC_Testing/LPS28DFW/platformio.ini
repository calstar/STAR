; LPS28DFW barometer — SparkFun library
; ESP32-C6 DevKitC-1 — same toolchain as IC_Testing/MCP3201T
; https://registry.platformio.org/libraries/sparkfun/SparkFun%20LPS28DFW%20Arduino%20Library

[env:esp32-c6-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
lib_extra_dirs =
	../../libraries
lib_deps =
	sparkfun/SparkFun LPS28DFW Arduino Library
build_flags =
	-I../../common
	-std=gnu++17
	-DBOARD_HAS_PSRAM=0
build_unflags =
	-std=gnu++11
monitor_speed = 115200
