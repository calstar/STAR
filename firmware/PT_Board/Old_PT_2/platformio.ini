[platformio]
extra_configs = ../../platformio-common.ini

[env:adafruit_feather_esp32s3]
extends = esp32s3_opi_base
lib_extra_dirs =
    ../../libraries
lib_deps = arduino-libraries/Ethernet@^2.0.2
build_flags =
    ${esp32s3_opi_base.build_flags}
    -I../../common
    -DBOARD_HAS_PSRAM=0

; LC1/LC2 flash workaround was copy-pasted here historically.
; Kept as overrides since this project still relied on them.
board_build.flash_mode = qio
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.partitions = default.csv
