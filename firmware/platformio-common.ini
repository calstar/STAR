; STAR firmware - shared PlatformIO configuration
;
; Per-project platformio.ini files pull this in via:
;   [platformio]
;   extra_configs = ../../platformio-common.ini   ; adjust depth
;
; ...then declare an [env:...] that `extends` one of the base
; sections below, e.g.:
;   [env:my_env]
;   extends = esp32s3_base
;   lib_deps = arduino-libraries/Ethernet
;   build_flags =
;       ${esp32s3_base.build_flags}
;       -I../common
;       -DPROJECT_FOO
;
; lib_extra_dirs and -I include paths stay per-project because
; the relative depth differs across project locations.

; ===== Chip-agnostic defaults =====
[common]
framework = arduino
monitor_speed = 115200
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17

; ===== ESP32-S3 (Adafruit Feather / DevKitM-1, espressif32 platform) =====
[esp32s3_base]
extends = common
platform = espressif32
board = esp32-s3-devkitm-1
build_flags =
    ${common.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.cdc_on_boot = 1

; S3 modules with OPI PSRAM (e.g. N16R8). Adds qio_opi memory mapping.
[esp32s3_opi_base]
extends = esp32s3_base
board_build.arduino.memory_type = qio_opi

; LC board flash workaround: LC1 is N16R2, LC2 is N4R8. Forcing 4 MB
; flash with default partitions lets the same image upload to both.
[esp32s3_lc_base]
extends = esp32s3_base
board_build.flash_mode = qio
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.partitions = default.csv

; ===== ESP32-C6 (DevKitC-1, pioarduino platform fork) =====
; C6 has only hardware USB Serial/JTAG (no TinyUSB OTG), same as C3.
[esp32c6_base]
extends = common
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitc-1
build_flags =
    ${common.build_flags}
    -DBOARD_HAS_PSRAM=0

; C6 with Serial routed to native USB-CDC/JTAG (use this if you want
; Serial.print over the chip's USB port; otherwise Serial goes via UART0).
[esp32c6_usb_base]
extends = esp32c6_base
build_flags =
    ${esp32c6_base.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.cdc_on_boot = 1

; ===== ESP32-C3 (DevKitC-02) =====
; C3 also has only hardware USB Serial/JTAG (no TinyUSB OTG).
[esp32c3_base]
extends = common
platform = espressif32
board = esp32-c3-devkitc-02
build_flags =
    ${common.build_flags}
    -DBOARD_HAS_PSRAM=0

; C3 with Serial routed to native USB-CDC/JTAG.
[esp32c3_usb_base]
extends = esp32c3_base
build_flags =
    ${esp32c3_base.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.cdc_on_boot = 1

; ===== Classic ESP32 (no native USB; UART0 via external bridge) =====
[esp32_classic_base]
extends = common
platform = espressif32
board = esp32dev

; ===== Host-side unit tests (Unity, no MCU) =====
[native_base]
platform = native
build_flags =
    -std=gnu++11
test_framework = unity
