; State Machine TC_Board - esp32-s3-devkitc-1 (not devkitm-1).
; No CDC flags, no C++17 - this project deliberately uses the
; default Arduino dialect and serial routing. Keeping it bespoke.

[platformio]
extra_configs = ../../platformio-common.ini

[env:esp32dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_extra_dirs =
    ../../libraries
lib_deps =
    arduino-libraries/Ethernet
board_build.flash_size = 4MB
board_build.flash_mode = dio
board_build.flash_freq = 80m
