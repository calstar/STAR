; Hotfire unit tests - runs on host PC (no ESP32 needed).
;
; Run tests:  pio test -e native   (from this directory)

[platformio]
extra_configs = ../../platformio-common.ini

[env:native]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -I stubs
    -I ../../libraries/DAQv2-Comms/src
    -I ../common
