; ProtoEncoder - dual AS5600 encoder board (always-active, no state machine)

[platformio]
extra_configs = ../../platformio-common.ini

[env:esp32s3_encoder]
extends = esp32s3_base
lib_extra_dirs =
    ../../libraries
lib_deps =
    arduino-libraries/Ethernet@^2.0.2
    Update
build_flags =
    ${esp32s3_base.build_flags}
    -I../common
    -I../../common
